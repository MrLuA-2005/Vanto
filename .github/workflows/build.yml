name: Build Vantom Kernel (Manual Hooks Mode)
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Build Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison build-essential flex git-lfs libssl-dev libelf-dev \
          clang lld llvm curl git zip unzip patch python3 \
          gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu \
          gcc-arm-linux-gnueabi binutils-arm-linux-gnueabi

      - name: Clone Vantom Kernel
        run: |
          git clone https://github.com/vantoman/kernel_xiaomi_sm6150.git -b 14 kernel_source

      - name: Integrate KSUN-Next & Manual Hooks
        run: |
          cd kernel_source
          # 1. Install KSUN Legacy
          curl -LSs "https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/next/kernel/setup.sh" | bash -s legacy
          
          # 2. Add Manual Hooks for 4.14 (Crucial for KSUN-Next)
          # Hook into fs/exec.c
          sed -i '/search_binary_handler(bprm);/i \ \ \ \ ksu_handle_execveat(&bprm->fd, &bprm->filename, &bprm->flags);' fs/exec.c
          # Hook into fs/open.c
          sed -i '/return do_entry_open(f, finish_open, op);/i \ \ \ \ ksu_handle_faccessat(&dfd, &filename, &mode, &flags);' fs/open.c
          # Hook into fs/read_write.c
          sed -i '/if (unlikely(ret < 0))/i \ \ \ \ ksu_handle_vfs_read(file, buf, count, pos);' fs/read_write.c
          # Hook into fs/stat.c
          sed -i '/if (!error)/i \ \ \ \ ksu_handle_stat(&dfd, &filename, &flags);' fs/stat.c

      - name: Integrate SusFS (With Auto-Fix)
        run: |
          cd kernel_source
          git clone https://gitlab.com/simonpunk/susfs4ksu.git -b kernel-4.14 susfs_source
          cp -r susfs_source/kernel_patches/fs/* fs/
          cp -r susfs_source/kernel_patches/include/linux/* include/linux/
          
          patch -p1 --forward < susfs_source/kernel_patches/50_add_susfs_in_kernel-4.14.patch || true
          
          # Fix cmdline.c
          if [ -f "fs/proc/cmdline.c.rej" ] || ! grep -q "susfs.h" fs/proc/cmdline.c; then
              sed -i '1i #include <linux/susfs.h>' fs/proc/cmdline.c
              sed -i '/seq_puts(m, saved_command_line);/i \t#ifdef CONFIG_KSU_SUSFS\n\tsusfs_modify_cmdline(&saved_command_line);\n\t#endif' fs/proc/cmdline.c
          fi
          
          # Fix task_mmu.c
          if [ -f "fs/proc/task_mmu.c.rej" ] || ! grep -q "susfs.h" fs/proc/task_mmu.c; then
              sed -i '1i #include <linux/susfs.h>' fs/proc/task_mmu.c
              python3 -c '
          with open("fs/proc/task_mmu.c", "r") as f: lines = f.readlines()
          for i, line in enumerate(lines):
              if "static int show_map_vma(" in line:
                  lines.insert(i+2, "#ifdef CONFIG_KSU_SUSFS\n\tif (vma->vm_file && unlikely(susfs_is_mnt_devname_sus(vma->vm_file))) return 0;\n#endif\n")
                  break
          with open("fs/proc/task_mmu.c", "w") as f: f.writelines(lines)
          '
          fi

      - name: Configure Kernel (Dynamic Hunter)
        run: |
          cd kernel_source
          REAL_DEFCONFIG=$(find arch/arm64/configs -name "*sweet*defconfig" | head -n 1)
          [ -z "$REAL_DEFCONFIG" ] && REAL_DEFCONFIG=$(find arch/arm64/configs -name "*sm6150*defconfig" | head -n 1)
          
          echo "CONFIG_XIAOMI_LN8000=y" >> $REAL_DEFCONFIG
          echo "CONFIG_BQ2597X=y" >> $REAL_DEFCONFIG
          echo "CONFIG_KSU=y" >> $REAL_DEFCONFIG
          echo "CONFIG_KSU_SUSFS=y" >> $REAL_DEFCONFIG
          echo "CONFIG_KSU_SUSFS_SUS_PATH=y" >> $REAL_DEFCONFIG
          echo "CONFIG_KSU_SUSFS_SPOOF_UNAME=y" >> $REAL_DEFCONFIG
          echo "CONFIG_KSU_SUSFS_ENABLE_LOG=n" >> $REAL_DEFCONFIG
          
          TARGET_DEFCONFIG=$(echo $REAL_DEFCONFIG | sed 's|arch/arm64/configs/||')
          echo "TARGET_DEFCONFIG=$TARGET_DEFCONFIG" >> $GITHUB_ENV

      - name: Build Kernel
        run: |
          cd kernel_source
          export ARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          export CROSS_COMPILE_ARM32=arm-linux-gnueabi-
          make O=out ARCH=arm64 CC=clang $TARGET_DEFCONFIG
          make -j$(nproc) O=out ARCH=arm64 CC=clang LD=ld.lld AR=llvm-ar NM=llvm-nm OBJCOPY=llvm-objcopy OBJDUMP=llvm-objdump STRIP=llvm-strip

      - name: Package Kernel (AnyKernel3)
        run: |
          git clone https://github.com/osm0sis/AnyKernel3.git
          cp kernel_source/out/arch/arm64/boot/Image.gz-dtb AnyKernel3/
          cd AnyKernel3
          sed -i 's/device.name1=.*/device.name1=sweet/' anykernel.sh
          zip -r ../Vantom-Sweet-Final.zip *

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Vantom-Sweet-Final
          path: Vantom-Sweet-Final.zip
