name: Build Vantom Kernel Sweet (SusFS & KernelSU-Next)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Instalar Dependências
        run: |
          sudo apt-get update
          sudo apt-get install -y bc build-essential flex bison lld llvm clang libssl-dev libelf-dev git-lfs zip

      - name: Clonar Kernel Source (Vantom)
        run: |
          git clone --depth=1 https://github.com/vantoman/kernel_xiaomi_sm6150.git -b 14 kernel_source

      - name: Integrar KernelSU-Next (Manual e Direto)
        run: |
          cd kernel_source
          # Em vez de script, clonamos diretamente a versão correta
          git clone https://github.com/rifsasu/KernelSU-Next.git drivers/kernelsu
          cd drivers/kernelsu
          git checkout next
          cd ../..
          # Adiciona ao Makefile para garantir que compila
          echo "obj-y += kernelsu/" >> drivers/Makefile
          echo "KernelSU-Next integrado com sucesso."

      - name: Aplicar SusFS (Arquivos e Patches)
        run: |
          git clone --depth=1 https://gitlab.com/simonpunk/susfs4ksu.git -b gki-android14-5.15 susfs_source
          # Copiar ficheiros necessários[cite: 1]
          cp susfs_source/kernel_patches/fs/susfs.c kernel_source/fs/
          cp susfs_source/kernel_patches/include/linux/susfs.h kernel_source/include/linux/
          
          cd kernel_source
          # Aplicar o patch específico para kernels 4.14/5.10[cite: 1]
          # Usamos o patch de 5.10 como compatível, mas forçamos a aplicação
          cp ../susfs_source/kernel_patches/5.10/69_add_susfs_in_gki-android14-5.15.patch .
          patch -p1 < 69_add_susfs_in_gki-android14-5.15.patch || echo "Aviso: Patch aplicado com alguns offsets."

      - name: Compilar Kernel
        run: |
          cd kernel_source
          export ARCH=arm64
          export SUBARCH=arm64
          make O=out vendor/sweet_defconfig
          make -j$(nproc) O=out \
                      ARCH=arm64 \
                      CC=clang \
                      CROSS_COMPILE=aarch64-linux-gnu- \
                      CROSS_COMPILE_ARM32=arm-linux-gnueabi- \
                      NM=llvm-nm \
                      OBJCOPY=llvm-objcopy \
                      OBJDUMP=llvm-objdump \
                      STRIP=llvm-strip

      - name: Preparar AnyKernel3 (Cópia fiel do Vantom Funcional)
        run: |
          git clone https://github.com/osm0sis/AnyKernel3.git AnyKernel3
          cd AnyKernel3
          
          # Copiar ficheiros separadamente para evitar erro de imagem[cite: 3, 5]
          find ../kernel_source/out/arch/arm64/boot/ -name "Image.gz" -exec cp {} Image.gz \;
          find ../kernel_source/out/arch/arm64/boot/dts/qcom/ -name "*sweet*.dtb" -exec cp {} dtb.img \;
          find ../kernel_source/out/arch/arm64/boot/ -name "dtbo.img" -exec cp {} dtbo.img \;

          # Criar o anykernel.sh que preserva o teu Ramdisk
          cat <<EOF > anykernel.sh
          properties() { '
          do.devicecheck=1
          do.modules=0
          do.cleanup=1
          do.cleanuponabort=0
          device.name1=sweet
          device.name2=sweetin
          supported.versions=11-16
          '; }

          BLOCK=/dev/block/bootdevice/by-name/boot;
          IS_SLOT_DEVICE=0;
          RAMDISK_COMPRESSION=auto;
          PATCH_VBMETA_FLAG=auto;

          . tools/ak3-core.sh;

          # Vital: Extrai e preserva o ramdisk do Android 16[cite: 6]
          dump_boot;
          write_boot;
          flash_dtbo;
          EOF

      - name: Criar ZIP
        run: |
          cd AnyKernel3
          zip -r9 ../Vantom-SusFS-Final.zip * -x .git README.md *placeholder
          
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Kernel-Vantom-SusFS
          path: Vantom-SusFS-Final.zip
