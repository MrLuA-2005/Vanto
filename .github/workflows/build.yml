name: Build Vantom Kernel Final (Fix Error 1 & Fastboot)
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Build Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison build-essential flex git-lfs libssl-dev libelf-dev \
          clang lld llvm curl git zip unzip patch python3 \
          gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu \
          gcc-arm-linux-gnueabi binutils-arm-linux-gnueabi

      - name: Clone Vantom Kernel
        run: |
          git clone https://github.com/vantoman/kernel_xiaomi_sm6150.git -b 14 kernel_source

      - name: Integrate KSUN-Next
        run: |
          cd kernel_source
          # Uso de clone direto para evitar erros de link 404 no futuro
          git clone --depth=1 https://github.com/rifsasu/KernelSU-Next.git -b next drivers/kernelsu
          echo "obj-y += kernelsu/" >> drivers/Makefile

      - name: Integrate SusFS (Sua lógica original)
        run: |
          cd kernel_source
          git clone https://gitlab.com/simonpunk/susfs4ksu.git -b kernel-4.14 susfs_source
          cp -r susfs_source/kernel_patches/fs/* fs/
          cp -r susfs_source/kernel_patches/include/linux/* include/linux/
          patch -p1 --forward < susfs_source/kernel_patches/50_add_susfs_in_kernel-4.14.patch || true
          
          sed -i '1i #include <linux/susfs.h>' fs/proc/cmdline.c
          sed -i '/seq_puts(m, saved_command_line);/i \    #ifdef CONFIG_KSU_SUSFS\n    susfs_modify_cmdline(&saved_command_line);\n    #endif' fs/proc/cmdline.c
          
          sed -i '1i #include <linux/susfs.h>' fs/proc/task_mmu.c
          python3 -c '
          with open("fs/proc/task_mmu.c", "r") as f: lines = f.readlines()
          for i, line in enumerate(lines):
              if "static int show_map_vma(" in line:
                  lines.insert(i+2, "#ifdef CONFIG_KSU_SUSFS\n\tif (vma->vm_file && unlikely(susfs_is_mnt_devname_sus(vma->vm_file))) return 0;\n#endif\n")
                  break
          with open("fs/proc/task_mmu.c", "w") as f: f.writelines(lines)
          '

      - name: Configure Kernel
        run: |
          cd kernel_source
          REAL_DEFCONFIG=$(find arch/arm64/configs -name "*sweet*defconfig" | head -n 1)
          [ -z "$REAL_DEFCONFIG" ] && REAL_DEFCONFIG=$(find arch/arm64/configs -name "*sm6150*defconfig" | head -n 1)
          
          for flag in CONFIG_KSU CONFIG_KSU_SUSFS CONFIG_KSU_SUSFS_SUS_PATH CONFIG_KSU_SUSFS_SPOOF_UNAME CONFIG_XIAOMI_LN8000 CONFIG_BQ2597X CONFIG_KPROBES CONFIG_HAVE_KPROBES CONFIG_KPROBE_EVENTS; do
            echo "$flag=y" >> $REAL_DEFCONFIG
          done
          echo "CONFIG_KSU_SUSFS_ENABLE_LOG=n" >> $REAL_DEFCONFIG
          
          TARGET_DEFCONFIG=$(echo $REAL_DEFCONFIG | sed 's|arch/arm64/configs/||')
          echo "TARGET_DEFCONFIG=$TARGET_DEFCONFIG" >> $GITHUB_ENV

      - name: Build Kernel
        run: |
          cd kernel_source
          export ARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          export CROSS_COMPILE_ARM32=arm-linux-gnueabi-
          make O=out ARCH=arm64 CC=clang $TARGET_DEFCONFIG
          make -j$(nproc) O=out ARCH=arm64 CC=clang LD=ld.lld AR=llvm-ar NM=llvm-nm OBJCOPY=llvm-objcopy OBJDUMP=llvm-objdump STRIP=llvm-strip

      - name: Package Kernel (Cópia fiel do Kernel Funcional)
        run: |
          git clone https://github.com/osm0sis/AnyKernel3.git AnyKernel3
          
          # 1. Copia os 3 ficheiros essenciais separadamente[cite: 3]
          find kernel_source/out/arch/arm64/boot/ -name "Image.gz" -exec cp {} AnyKernel3/Image.gz \;
          find kernel_source/out/arch/arm64/boot/dts/qcom/ -name "*sweet*.dtb" -exec cp {} AnyKernel3/dtb.img \;
          find kernel_source/out/arch/arm64/boot/ -name "dtbo.img" -exec cp {} AnyKernel3/dtbo.img \;
          
          cd AnyKernel3
          
          # 2. Escreve o anykernel.sh IDÊNTICO ao do developer que funciona
          cat <<EOF > anykernel.sh
          # global properties
          properties() { '
          do.devicecheck=1
          do.modules=0
          do.cleanup=1
          do.cleanuponabort=0
          device.name1=sweet
          device.name2=sweetin
          supported.versions=11-16
          '; }

          # boot shell variables
          BLOCK=/dev/block/bootdevice/by-name/boot;
          IS_SLOT_DEVICE=0;
          RAMDISK_COMPRESSION=auto;
          PATCH_VBMETA_FLAG=auto;

          . tools/ak3-core.sh;

          # dump_boot garante a preservação do Ramdisk do Android 16
          dump_boot;
          write_boot;
          flash_dtbo;
          EOF

          zip -r9 ../Vantom-Sweet-SusFS-Final.zip . -x ".git*"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Vantom-Sweet-Kernel
          path: Vantom-Sweet-SusFS-Final.zip
