name: Build Vantom Kernel Sweet (SusFS & KernelSU-Next)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Instalar Dependências
        run: |
          sudo apt-get update
          sudo apt-get install -y bc build-essential flex bison lld llvm clang libssl-dev libelf-dev git-lfs zip

      - name: Clonar Kernel Source (Vantom Base)
        run: |
          git clone --depth=1 https://github.com/vantoman/kernel_xiaomi_sm6150.git -b 14 kernel_source

      - name: Clonar KernelSU-Next
        run: |
          cd kernel_source
          curl -LSs "https://raw.githubusercontent.com/rifsasu/KernelSU-Next/next/kernel/setup.sh" | bash -s next

      - name: Clonar e Aplicar SusFS
        run: |
          git clone https://gitlab.com/simonpunk/susfs4ksu.git -b gki-android14-5.15 susfs_source
          cp susfs_source/kernel_patches/5.10/69_add_susfs_in_gki-android14-5.15.patch kernel_source/
          cp susfs_source/kernel_patches/fs/susfs.c kernel_source/fs/
          cp susfs_source/kernel_patches/include/linux/susfs.h kernel_source/include/linux/
          cd kernel_source
          # Aplicar patches no código fonte
          patch -p1 < 69_add_susfs_in_gki-android14-5.15.patch || true

      - name: Compilar Kernel
        run: |
          cd kernel_source
          export ARCH=arm64
          export SUBARCH=arm64
          make O=out vendor/sweet_defconfig
          make -j$(nproc) O=out \
                      ARCH=arm64 \
                      CC=clang \
                      CROSS_COMPILE=aarch64-linux-gnu- \
                      CROSS_COMPILE_ARM32=arm-linux-gnueabi- \
                      NM=llvm-nm \
                      OBJCOPY=llvm-objcopy \
                      OBJDUMP=llvm-objdump \
                      STRIP=llvm-strip

      - name: Preparar AnyKernel3 (Estrutura Vantom)
        run: |
          git clone https://github.com/osm0sis/AnyKernel3.git AnyKernel3
          cd AnyKernel3
          
          # 1. Copiar o Kernel puro (como no ZIP original)
          find ../kernel_source/out/arch/arm64/boot/ -name "Image.gz" -exec cp {} Image.gz \;
          
          # 2. Copiar o DTB isolado (o tal ficheiro dtb.img)
          find ../kernel_source/out/arch/arm64/boot/dts/qcom/ -name "*sweet*.dtb" -exec cp {} dtb.img \;
          
          # 3. Copiar o DTBO
          find ../kernel_source/out/arch/arm64/boot/ -name "dtbo.img" -exec cp {} dtbo.img \;

          # 4. Criar o anykernel.sh baseado no Vantom que funciona
          cat <<EOF > anykernel.sh
          # global properties
          properties() { '
          do.devicecheck=1
          do.modules=0
          do.cleanup=1
          do.cleanuponabort=0
          device.name1=sweet
          device.name2=sweetin
          supported.versions=11-16
          '; }

          # boot shell variables
          BLOCK=/dev/block/bootdevice/by-name/boot;
          IS_SLOT_DEVICE=0;
          RAMDISK_COMPRESSION=auto;
          PATCH_VBMETA_FLAG=auto;

          . tools/ak3-core.sh;

          # Extrai o boot atual para preservar o Ramdisk do Android 16
          dump_boot;

          # Escreve o novo Kernel e DTB na imagem extraída
          write_boot;

          # Instala o DTBO na partição correta
          flash_dtbo;
          EOF

      - name: Criar ZIP Final
        run: |
          cd AnyKernel3
          zip -r9 ../Vantom-Sweet-SusFS-A16.zip * -x .git README.md *placeholder
          
      - name: Upload Artefacto
        uses: actions/upload-artifact@v4
        with:
          name: Vantom-Sweet-SusFS-Kernel
          path: Vantom-Sweet-SusFS-A16.zip
