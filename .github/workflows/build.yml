name: Build Vantom Kernel Sweet Legacy (KSU-Next & SusFS)
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Instalar Dependências
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison build-essential flex git-lfs libssl-dev libelf-dev \
          clang lld llvm curl git zip unzip patch python3 \
          gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu \
          gcc-arm-linux-gnueabi binutils-arm-linux-gnueabi

      - name: Clonar Kernel Source (Vantom 4.14)
        run: |
          git clone --depth=1 https://github.com/vantoman/kernel_xiaomi_sm6150.git -b 14 kernel_source

      - name: Integrar KernelSU-Next (Modo Legacy Manual)
        run: |
          cd kernel_source
          # Clona a branch 'next' que contém o suporte ao Sweet
          git clone --depth=1 https://github.com/KernelSU-Next/KernelSU-Next.git -b next drivers/kernelsu
          # A integração Legacy exige a adição manual ao Makefile de drivers[cite: 3]
          echo "obj-y += kernelsu/" >> drivers/Makefile
          echo "KernelSU-Next Legacy integrado."

      - name: Integrar SusFS (Branch 4.14 Legacy)
        run: |
          cd kernel_source
          # Usa especificamente a branch kernel-4.14 para compatibilidade legacy[cite: 3]
          git clone --depth=1 https://gitlab.com/simonpunk/susfs4ksu.git -b kernel-4.14 susfs_source
          cp -r susfs_source/kernel_patches/fs/* fs/
          cp -r susfs_source/kernel_patches/include/linux/* include/linux/
          patch -p1 --forward < susfs_source/kernel_patches/50_add_susfs_in_kernel-4.14.patch || true
          
          # Fixes de invisibilidade para Android 16 (Sua lógica original funcional)[cite: 3]
          sed -i '1i #include <linux/susfs.h>' fs/proc/cmdline.c
          sed -i '/seq_puts(m, saved_command_line);/i \    #ifdef CONFIG_KSU_SUSFS\n    susfs_modify_cmdline(&saved_command_line);\n    #endif' fs/proc/cmdline.c
          
          sed -i '1i #include <linux/susfs.h>' fs/proc/task_mmu.c
          python3 -c '
          with open("fs/proc/task_mmu.c", "r") as f: lines = f.readlines()
          for i, line in enumerate(lines):
              if "static int show_map_vma(" in line:
                  lines.insert(i+2, "#ifdef CONFIG_KSU_SUSFS\n\tif (vma->vm_file && unlikely(susfs_is_mnt_devname_sus(vma->vm_file))) return 0;\n#endif\n")
                  break
          with open("fs/proc/task_mmu.c", "w") as f: f.writelines(lines)
          '

      - name: Configurar e Compilar
        run: |
          cd kernel_source
          export ARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          export CROSS_COMPILE_ARM32=arm-linux-gnueabi-
          
          # Ativa as flags Legacy no defconfig[cite: 3]
          REAL_DEFCONFIG="arch/arm64/configs/vendor/sweet_defconfig"
          for flag in CONFIG_KSU CONFIG_KSU_SUSFS CONFIG_KSU_SUSFS_SUS_PATH CONFIG_KSU_SUSFS_SPOOF_UNAME CONFIG_KPROBES CONFIG_HAVE_KPROBES; do
            echo "$flag=y" >> $REAL_DEFCONFIG
          done
          
          make O=out ARCH=arm64 CC=clang vendor/sweet_defconfig
          make -j$(nproc) O=out ARCH=arm64 CC=clang LD=ld.lld AR=llvm-ar NM=llvm-nm OBJCOPY=llvm-objcopy OBJDUMP=llvm-objdump STRIP=llvm-strip

      - name: Preparar AnyKernel3 (Cópia fiel do Vantom Original)
        run: |
          git clone https://github.com/osm0sis/AnyKernel3.git AnyKernel3
          cd AnyKernel3
          
          # Separa os arquivos exatamente como no ZIP que funciona[cite: 3]
          find ../kernel_source/out/arch/arm64/boot/ -name "Image.gz" -exec cp {} Image.gz \;
          find ../kernel_source/out/arch/arm64/boot/dts/qcom/ -name "*sweet*.dtb" -exec cp {} dtb.img \;
          find ../kernel_source/out/arch/arm64/boot/ -name "dtbo.img" -exec cp {} dtbo.img \;

          # anykernel.sh IDÊNTICO ao ZIP funcional para evitar Error 1 e Fastboot
          cat <<EOF > anykernel.sh
          properties() { '
          do.devicecheck=1
          do.modules=0
          do.cleanup=1
          do.cleanuponabort=0
          device.name1=sweet
          device.name2=sweetin
          supported.versions=11-16
          '; }
          BLOCK=/dev/block/bootdevice/by-name/boot;
          IS_SLOT_DEVICE=0;
          RAMDISK_COMPRESSION=auto;
          PATCH_VBMETA_FLAG=auto;
          . tools/ak3-core.sh;
          dump_boot; # Preserva o Ramdisk do Android 16
          write_boot;
          flash_dtbo;
          EOF

          zip -r9 ../Vantom-Legacy-KSUN-SusFS.zip * -x .git README.md *placeholder

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Vantom-Legacy-Kernel
          path: Vantom-Legacy-KSUN-SusFS.zip
