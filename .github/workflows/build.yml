name: Build Vantom Kernel (Manual Stable Mode)
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Build Tools
        run: |
          sudo apt update
          sudo apt install -y bc bison build-essential flex git-lfs libssl-dev libelf-dev clang lld llvm

      - name: Clone Vantom Kernel
        run: |
          # Clones the modern Vantom source for sweet (Snapdragon 732G)
          git clone https://github.com/vantoman/kernel_xiaomi_sm6150.git -b 14 kernel_source

      - name: Integrate KSUN & SusFS 2.1.0
        run: |
          cd kernel_source
          # 1. Install KernelSU-Next (Legacy branch for 4.14 kernel)
          curl -LSs "https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/next/kernel/setup.sh" | bash -s legacy
          
          # 2. Apply SusFS v2.1.0 (Latest 2026 NON-GKI patch)
          git clone https://gitlab.com/simonpunk/susfs4ksu.git -b kernel-4.14-v2.1.0 susfs_source
          cp -r susfs_source/kernel_patches/fs/* fs/
          cp -r susfs_source/kernel_patches/include/linux/* include/linux/
          patch -p1 < susfs_source/kernel_patches/50_add_susfs_in_kernel-4.14.patch

      - name: Manual Mode Hardware Config
        run: |
          # Navigate to the config file for your device
          cd kernel_source/arch/arm64/configs/vendor/
          
          # Enable LN8000 Charging Drivers for Sweet
          echo "CONFIG_XIAOMI_LN8000=y" >> sweet_user_defconfig
          echo "CONFIG_BQ2597X=y" >> sweet_user_defconfig
          
          # Manual Mode Feature Flags (Stable Stealth)
          echo "CONFIG_KSU=y" >> sweet_user_defconfig
          echo "CONFIG_KSU_SUSFS=y" >> sweet_user_defconfig
          echo "CONFIG_KSU_SUSFS_SUS_PATH=y" >> sweet_user_defconfig
          echo "CONFIG_KSU_SUSFS_SPOOF_UNAME=y" >> sweet_user_defconfig
          # We omit AUTO_ADD_SUS_KSTAT for better stability in Manual Mode

      - name: Final Build
        run: |
          cd kernel_source
          export ARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          # Build using Clang toolchain
          make O=out vendor/sweet_user_defconfig
          make -j$(nproc) O=out CC=clang

      - name: Upload Kernel Image
        uses: actions/upload-artifact@v4
        with:
          name: Vantom-Manual-Stable-Kernel
          path: kernel_source/out/arch/arm64/boot/Image.gz-dtb
